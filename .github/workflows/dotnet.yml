name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      # -m:1 serializes the MSBuild graph to work around a known parallel-build
      # race in multi-target projects (BTCPayServer.Client / BTCPayServer.Common)
      # where the per-TFM GenerateDepsFile task can collide on the shared deps.json.
      run: dotnet build --no-restore -m:1
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Test native bindings
      run: cargo test --locked --manifest-path BoltzClientBindings/Cargo.toml
    - name: Test plugin units
      run: dotnet test NArk.E2E.Tests/NArk.E2E.Tests.csproj -m:1 --filter "Category=Unit" --verbosity normal
