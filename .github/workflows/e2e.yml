name: E2E

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Start regtest stack (BoltzExchange/regtest)
        env:
          ARBITRUM_E2E_RPC_URL: ${{ vars.ARBITRUM_E2E_RPC_URL }}
          ETHEREUM_E2E_RPC_URL: ${{ vars.ETHEREUM_E2E_RPC_URL }}
        run: make regtest
        timeout-minutes: 20

      - name: Restore + Build solution and E2E test project
        run: |
          dotnet restore NArk.sln
          dotnet build NArk.sln --no-restore -m:1
          dotnet restore NArk.E2E.Tests/NArk.E2E.Tests.csproj
          dotnet build NArk.E2E.Tests/NArk.E2E.Tests.csproj --no-restore
        timeout-minutes: 12

      - name: Run ConfigBuilder (writes appsettings.dev.json with plugin DLL path)
        # BTCPay's Program.cs unconditionally loads
        # submodules/btcpayserver/BTCPayServer/appsettings.dev.json under
        # #if DEBUG. ConfigBuilder writes a DEBUG_PLUGINS entry there
        # pointing at the Arkade plugin's bin output so ServerTester's
        # in-process BTCPay picks it up at startup.
        run: dotnet run --project ConfigBuilder/ConfigBuilder.csproj

      - name: Install Playwright browsers
        run: |
          SCRIPT=$(find NArk.E2E.Tests/bin -name "playwright.ps1" -print -quit)
          if [ -z "$SCRIPT" ]; then
            echo "❌ playwright.ps1 not found in NArk.E2E.Tests/bin"
            find NArk.E2E.Tests/bin -maxdepth 4 -type f | head -50
            exit 1
          fi
          pwsh "$SCRIPT" install --with-deps chromium
        timeout-minutes: 5

      - name: Run E2E tests
        # bitcoind uses cookie auth; BTCPay's DatabaseTester replaces the
        # literal "btcpayserver" in TESTS_POSTGRES with a random per-run
        # database name, created on the stack's postgres (boltz superuser).
        run: |
          TESTS_BTCRPCCONNECTION="server=http://127.0.0.1:18443;$(docker exec boltz-bitcoind cat /app/bitcoin/regtest/.cookie)" \
          TESTS_BTCNBXPLORERURL="http://127.0.0.1:32838/" \
          TESTS_POSTGRES="User ID=boltz;Password=boltz;Include Error Detail=true;Host=127.0.0.1;Port=5432;Database=btcpayserver" \
          TESTS_EXPLORER_POSTGRES="User ID=boltz;Password=boltz;Include Error Detail=true;Host=127.0.0.1;Port=5432;Database=nbxplorer" \
          TESTS_HOSTNAME="127.0.0.1" \
          dotnet test NArk.E2E.Tests/NArk.E2E.Tests.csproj --no-build --verbosity normal --logger "console;verbosity=detailed"
        timeout-minutes: 20

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/e2e-logs
          for c in boltz-bitcoind boltz-nbxplorer boltz-postgres arkd arkd-wallet fulmine boltz-backend boltz-backend-nginx boltz-lnd-1 boltz-lnd-2 boltz-regtest-start; do
            docker logs "$c" > /tmp/e2e-logs/${c}.log 2>&1 || true
          done

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/e2e-logs/

      - name: Stop regtest stack
        if: always()
        run: make regtest-clean || true
